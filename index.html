<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast Web Player</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="background-effects">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="player-container">
        <div class="header">
            <h1>The Weekly AI Podcast</h1>
            <p class="subtitle">
                This content is AI-generated from publicly available sources. 
                May contain inaccuracies. For personal use only.</p>
        </div>

        <div class="now-playing">
            <h2 id="track-title" class="track-title">Loading...</h2>
            <p id="track-date" class="track-date">--</p>
        </div>

        <audio id="audio-element"></audio>

        <div class="controls-section" id="controls-section">
            <div class="progress-container">
                <span id="current-time">0:00</span>
                <div class="progress-bar-wrapper" id="progress-bar-wrapper">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <span id="duration">0:00</span>
            </div>

            <div class="main-controls">
                <button id="play-pause-btn" class="control-btn play-btn" aria-label="Play/Pause">
                    <i class="fas fa-play" id="play-icon"></i>
                </button>
            </div>

            <div class="speed-controls">
                <button id="slower-btn" class="speed-btn" aria-label="Decrease speed"><i class="fas fa-minus"></i>
                    Slower</button>
                <div class="speed-display" id="speed-display">1.0x</div>
                <button id="faster-btn" class="speed-btn" aria-label="Increase speed">Faster <i
                        class="fas fa-plus"></i></button>
            </div>
        </div>

        <div class="playlist-section">
            <h3 class="playlist-title">Past Episodes</h3>
            <div class="playlist-container" id="playlist-container">
                <!-- Episodes will be injected here via JavaScript -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
